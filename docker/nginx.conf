server {

    listen 1234;
    server_name jokenpo.dev;
    root /usr/share/nginx/html;
    index index.html;

    # Evita que o Nginx coloque a porta 1234 nos redirecionamentos (ex: /sobre -> /sobre/)
    port_in_redirect off;
    absolute_redirect off;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache de assets estáticos (Astro gera arquivos com hash, então são imutáveis)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Cache para páginas HTML (Cloudflare Edge Cache)
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "public, max-age=3600"; # Cache de 1 hora para o HTML
    }

    # Sem logs de favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}

# Servidor de Arquivos (Subdomínio)
server {
    listen 1235;

    server_name files.jokenpo.dev;
    root /usr/share/nginx/files;


    # Público: Imagens do blog
    location /blog/ {
        autoindex off;
        # Cache longo para imagens
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Privado: Bloqueio por padrão (usar com Cloudflare Access)
    location / {
        return 403;
    }

    # Desativa logs para o resto dos arquivos privados
    access_log off;
}
